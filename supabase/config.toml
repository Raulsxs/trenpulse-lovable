[functions.connect-social]
verify_jwt = false

[functions.publish-postforme]
verify_jwt = false

# Internal-only functions (called by ai-chat via service-role). The service-role env key is
# the new sb_secret_* format (NOT a JWT), so gateway JWT verification rejects internal calls
# with UNAUTHORIZED_INVALID_JWT_FORMAT. Must be verify_jwt=false like the other internal fns.
[functions.render-slide-image]
verify_jwt = false

[functions.generate-slide-images]
verify_jwt = false

# Vídeo animado via Grok — chamada interna (service_role) pela tool gerar_video do /agent.
[functions.generate-video]
verify_jwt = false

# Webhook do Asaas — não manda JWT do Supabase; autenticidade via header asaas-access-token.
[functions.asaas-webhook]
verify_jwt = false

# Orquestrador agêntico — chamado pelo front com o JWT do usuário (resolve getUser e repassa
# o JWT pros tools que reusam o ai-chat). verify_jwt=true (default, explícito por clareza).
[functions.ai-agent]
verify_jwt = true

# Validação temporária do caminho de visão do style_guide (REMOVER após validar).
[functions.diag-vision]
verify_jwt = false